<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Manajemen Loker - Sistem Penyimpanan 40 Loker</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="header">
            <h1><i class="fas fa-archive"></i> Sistem Manajemen Loker</h1>
            <p>40 Loker Digital | Aman & Terintegrasi</p>
        </header>

        <!-- Petugas Selector -->
        <div class="petugas-bar">
            <label for="petugasSelect"><i class="fas fa-user-check"></i> Petugas Bertugas:</label>
            <select id="petugasSelect" class="petugas-select">
                <option value="">-- Pilih Petugas --</option>
                <option value="Iwan">Iwan</option>
                <option value="Sigit">Sigit</option>
                <option value="Broery">Broery</option>
                <option value="Jean">Jean</option>
            </select>
            <span class="petugas-badge" id="petugasBadge">Belum dipilih</span>
        </div>

        <!-- Navigation Bar Loker -->
        <nav class="loker-nav">
            <div class="nav-header">
                <i class="fas fa-door-open"></i> Pilih Loker:
            </div>
            <div class="nav-buttons" id="lokerNavButtons">
                <!-- Tombol Loker 1-40 akan di-generate oleh JS -->
            </div>
        </nav>

        <!-- Main Content: Form + Data Display -->
        <div class="main-content">
            <!-- Form Section -->
            <div class="form-card">
                <div class="form-header">
                    <h2 id="selectedLokerTitle">Loker #<span id="lokerNumber">1</span></h2>
                    <i class="fas fa-edit"></i>
                </div>
                
                <form id="lokerForm">
                    <div class="form-group">
                        <label><i class="fas fa-user"></i> Nama Customer</label>
                        <input type="text" id="namaCustomer" placeholder="Masukkan nama lengkap" autocomplete="off">
                    </div>

                    <div class="form-group">
                        <label><i class="fas fa-tag"></i> PIN Loker (Minimal 4 digit)</label>
                        <input type="text" id="pinLoker" placeholder="Contoh: 1234" maxlength="6" pattern="\d*" inputmode="numeric">
                        <small>PIN akan terlihat langsung untuk keamanan internal</small>
                    </div>

                    <div class="form-group">
                        <label><i class="fas fa-check-circle"></i> Status Pengambilan</label>
                        <select id="statusPengambilan">
                            <option value="belum">Belum Diambil</option>
                            <option value="sudah">Sudah Diambil</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label><i class="fas fa-calendar-alt"></i> Tanggal Transaksi</label>
                        <input type="text" id="tanggal" readonly placeholder="Otomatis saat save">
                    </div>

                    <div class="form-group">
                        <label><i class="fas fa-id-badge"></i> Nama Petugas</label>
                        <input type="text" id="namaPetugas" readonly placeholder="Pilih dari dropdown atas">
                    </div>

                    <div class="form-group">
                        <label><i class="fas fa-camera"></i> Foto Bukti Isi Loker</label>
                        <input type="file" id="fotoBukti" accept="image/*" capture="environment">
                        <div class="preview-container" id="previewContainer">
                            <img id="fotoPreview" alt="Preview foto" style="display: none;">
                        </div>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn-save"><i class="fas fa-save"></i> Simpan Data</button>
                        <button type="button" id="clearFormBtn" class="btn-clear"><i class="fas fa-trash-alt"></i> Bersihkan Form Total</button>
                    </div>
                </form>
            </div>

            <!-- Data Display Section -->
            <div class="data-card">
                <div class="data-header">
                    <h2><i class="fas fa-database"></i> Data Loker #<span id="displayLokerNumber">1</span></h2>
                    <div class="data-actions">
                        <button id="refreshDataBtn" class="icon-btn"><i class="fas fa-sync-alt"></i></button>
                    </div>
                </div>
                
                <div class="data-content" id="dataContent">
                    <div class="info-row">
                        <span class="label">Nama Customer:</span>
                        <span id="displayNama" class="value">-</span>
                    </div>
                    <div class="info-row">
                        <span class="label">PIN Loker:</span>
                        <span id="displayPin" class="value pin-value">-</span>
                    </div>
                    <div class="info-row">
                        <span class="label">Status:</span>
                        <span id="displayStatus" class="value status-badge">-</span>
                    </div>
                    <div class="info-row">
                        <span class="label">Tanggal:</span>
                        <span id="displayTanggal" class="value">-</span>
                    </div>
                    <div class="info-row">
                        <span class="label">Petugas:</span>
                        <span id="displayPetugas" class="value">-</span>
                    </div>
                    <div class="info-row foto-row">
                        <span class="label">Foto Bukti:</span>
                        <div class="foto-display" id="fotoDisplay">
                            <span class="no-foto">Tidak ada foto</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Modal untuk Zoom Foto -->
        <div id="imageModal" class="modal">
            <span class="close-modal">&times;</span>
            <img class="modal-content" id="modalImage">
            <div id="modalCaption"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
